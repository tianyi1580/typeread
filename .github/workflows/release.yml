name: "Publish Release"

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action replaces this with the version from tauri.conf.json
          releaseName: "TypeRead v__VERSION__"
          releaseBody: "See the assets below to download for your platform."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'windows-latest' && '--target x86_64-pc-windows-msvc' || '' }}

      - name: Generate Homebrew Cask Snippet (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -n 1)
          DMG_NAME=$(basename "$DMG_PATH")
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{ print $1 }')
          
          echo "Generating Homebrew Cask for v$VERSION..."
          
          cat <<EOF > homebrew-cask-snippet.txt
          cask "typeread" do
            version "$VERSION"
            sha256 "$SHA256"
            url "https://github.com/tianyi1580/typeread/releases/download/v#{version}/$DMG_NAME"
            name "TypeRead"
            desc "A minimalist, beautiful typing practice app for readers"
            homepage "https://github.com/tianyi1580/typeread"
            app "TypeRead.app"
            postflight do
              system_command "xattr", args: ["-rd", "com.apple.quarantine", "#{appdir}/TypeRead.app"]
            end
          end
          EOF
          
      - name: Upload Homebrew Snippet
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-cask-v${{ strategy.job-index }}
          path: homebrew-cask-snippet.txt
